name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------------
  # GITLEAKS — primer job, bloquea todo si hay secretos expuestos.
  # Se ejecuta antes que cualquier otra cosa porque un secreto en el código
  # invalida cualquier análisis posterior.
  # -----------------------------------------------------------------------
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -----------------------------------------------------------------------
  # TEST — los tests antes que cualquier scanner.
  # No tiene sentido escanear código que ni siquiera funciona.
  # -----------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -v

  # -----------------------------------------------------------------------
  # SONARCLOUD — SAST: analiza el código fuente.
  # Corre en paralelo con snyk después de que los tests pasan.
  # -----------------------------------------------------------------------
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io
      - name: SonarCloud summary
        if: always()
        run: |
          echo "## SonarCloud SAST" >> $GITHUB_STEP_SUMMARY
          echo "Análisis completado. Revisa los resultados en [SonarCloud](https://sonarcloud.io)." >> $GITHUB_STEP_SUMMARY

  # -----------------------------------------------------------------------
  # SNYK — SCA: analiza dependencias de Python.
  # Corre en paralelo con sonarcloud.
  # -----------------------------------------------------------------------
  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Snyk scan — generate JSON report
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-report.json
      - name: Upload Snyk JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk-report.json
          retention-days: 7
      - name: Snyk — enforce threshold
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
      - name: Snyk summary
        if: always()
        run: bash scripts/snyk_summary.sh

  # -----------------------------------------------------------------------
  # BUILD — construye la imagen UNA SOLA VEZ y la publica con el SHA como tag.
  #
  # Decisión de seguridad: construir una vez garantiza que la imagen
  # escaneada por Trivy es exactamente la misma que llega al cluster.
  # Si cada job construyera la suya, podríamos escanear A y desplegar B.
  #
  # El tag SHA es inmutable: identifica exactamente qué commit produjo
  # esta imagen. latest se añade después, solo si todos los scans pasan.
  # -----------------------------------------------------------------------
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: [sonarcloud, snyk]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: |
          echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' \
            | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push with SHA tag
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # -----------------------------------------------------------------------
  # TRIVY — container image scan.
  #
  # FIX 1: exit-code: '1' hace que el job falle si encuentra
  # vulnerabilidades HIGH/CRITICAL con fix disponible. Sin esto,
  # Trivy reporta pero el pipeline continúa — el scanner no sirve de nada.
  #
  # FIX 2: ignore-unfixed: true en el scan que bloquea, false en el SARIF.
  # Bloqueamos solo lo que podemos arreglar. Reportamos todo para visibilidad.
  #
  # FIX 3: escaneamos la imagen de GHCR, no una construida localmente.
  # Es el mismo artefacto que ArgoCD desplegará en el cluster.
  # -----------------------------------------------------------------------
  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: |
          echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' \
            | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Scan 1: bloquea el pipeline si hay HIGH/CRITICAL con fix disponible
      - name: Trivy scan — blocking
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'json'
          output: 'trivy-report.json'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 7

      # Scan 2: reporte completo para GitHub Security, sin bloquear
      # if: always() garantiza que se genera aunque el scan anterior haya fallado
      - name: Trivy scan — full SARIF report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-report.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          ignore-unfixed: false

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-report.sarif

      - name: Trivy summary
        if: always()
        run: bash scripts/trivy_summary.sh

  # -----------------------------------------------------------------------
  # ZAP — DAST: ataca la app corriendo.
  #
  # FIX: fail_action: true con un archivo de reglas .zap/rules.tsv.
  # fail_action: false significa que ZAP nunca puede bloquear el deploy,
  # convirtiendo el scanner en decoración.
  # El archivo de reglas permite control granular: FAIL solo en lo crítico,
  # WARN en el resto, IGNORE en falsos positivos conocidos.
  # -----------------------------------------------------------------------
  zap:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      issues: write
      security-events: write
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: |
          echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' \
            | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Usa la misma imagen escaneada por Trivy, no una nueva build
      - name: Run app from GHCR image
        run: |
          docker run -d -p 5000:5000 --name app \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for app to be ready
        run: |
          echo "Waiting for app..."
          for i in {1..10}; do
            curl -sf http://localhost:5000 && break
            echo "Attempt $i failed, retrying..."
            sleep 3
          done

      - name: Run ZAP scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:5000'
          fail_action: true
          rules_file_name: '.zap/rules.tsv'
          artifact_name: zap-report
          cmd_options: '-I'

      - name: Upload ZAP SARIF to GitHub Security
        if: always() && hashFiles('zap-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: zap-report.sarif

      - name: ZAP summary
        if: always()
        run: bash scripts/zap_summary.sh

  # -----------------------------------------------------------------------
  # SECURITY REPORT — consolida todos los artefactos.
  # if: always() garantiza visibilidad completa aunque algún scanner falle.
  # -----------------------------------------------------------------------
  security-report:
    name: Consolidated Security Report
    runs-on: ubuntu-latest
    needs: [sonarcloud, snyk, trivy, zap, gitleaks]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports
      - name: Make scripts executable
        run: chmod +x scripts/*.sh
      - name: Generate consolidated report
        run: bash scripts/generate_consolidated_report.sh
      - name: Upload consolidated report
        uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ github.run_number }}
          path: consolidated-report.md
          retention-days: 7
      - name: Post summary to GitHub
        if: always()
        run: |
          if [ -f consolidated-report.md ]; then
            cat consolidated-report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## Security Report" >> $GITHUB_STEP_SUMMARY
            echo "No se pudo generar el reporte consolidado." >> $GITHUB_STEP_SUMMARY
          fi

  # -----------------------------------------------------------------------
  # DEPLOY — promociona la imagen SHA a latest.
  #
  # No reconstruye la imagen. Re-tagea la imagen ya escaneada.
  # Esto garantiza que lo que llega al cluster es exactamente
  # lo que pasó por Trivy y ZAP.
  #
  # Las condiciones explícitas en cada needs.X.result son intencionales:
  # security-report tiene if: always() — su 'success' no implica que los
  # scanners pasaron, solo que el job de reporte se ejecutó.
  # Por eso verificamos cada scanner individualmente.
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy — promote image to latest
    runs-on: ubuntu-latest
    needs: [gitleaks, test, sonarcloud, snyk, trivy, zap, security-report]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.gitleaks.result == 'success' &&
      needs.test.result == 'success' &&
      needs.sonarcloud.result == 'success' &&
      needs.snyk.result == 'success' &&
      needs.trivy.result == 'success' &&
      needs.zap.result == 'success'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set image name
        run: |
          echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' \
            | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Descarga la imagen ya escaneada y le añade el tag latest
      # Sin reconstruir — lo que se escanea es lo que se despliega
      - name: Promote SHA image to latest
        run: |
          docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag  ${{ env.IMAGE_NAME }}:${{ github.sha }} \
                      ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:latest
          echo "Promoted ${{ github.sha }} to latest" >> $GITHUB_STEP_SUMMARY

  # -----------------------------------------------------------------------
  # UPDATE CONFIG — opens a PR in the config repo (Lab2) updating image.tag
  # in values.yaml to the exact SHA that passed all security scans.
  #
  # Uses a SHA tag (not latest) so the deployed image is fully traceable
  # back to the commit and pipeline run that produced it.
  #   
  # 
  # Requires a secret CONFIG_REPO_TOKEN: a GitHub PAT with 'repo' scope
  # on the config repo (Illumidragui/devsecops-k8s-config).
  # -----------------------------------------------------------------------
  update-config:
    name: Open PR in config repo
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: read
    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: Illumidragui/devsecops-k8s-config
          token: ${{ secrets.CONFIG_REPO_TOKEN }}

      - name: Update image tag in values.yaml
        run: |
          sed -i 's/^\(\s*tag:\s*\).*/\1"${{ github.sha }}"/' flask-app/values.yaml

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.CONFIG_REPO_TOKEN }}
          commit-message: "chore: update image tag to ${{ github.sha }}"
          branch: "deploy/${{ github.sha }}"
          title: "deploy: ${{ github.sha }}"
          body: |
            Automated image update from [Lab1 pipeline run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            **Image:** `ghcr.io/illumidragui/devsecops-pipeline:${{ github.sha }}`

            All security gates passed:
            - Gitleaks (secret scan)
            - Tests
            - SonarCloud (SAST)
            - Snyk (SCA)
            - Trivy (container scan)
            - OWASP ZAP (DAST)
          base: main
          delete-branch: true