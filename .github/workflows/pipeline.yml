name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -v

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io

      - name: SonarCloud summary
        if: always()
        run: |
          echo "## 🔍 SonarCloud SAST" >> $GITHUB_STEP_SUMMARY
          echo "Análisis completado. Revisa los resultados en [SonarCloud](https://sonarcloud.io)." >> $GITHUB_STEP_SUMMARY

  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Snyk scan - generate JSON report
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-report.json

      - name: Upload Snyk report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: snyk-report
          path: snyk-report.json
          retention-days: 7

      - name: Snyk - enforce threshold
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Snyk summary
        if: always()
        run: bash scripts/snyk_summary.sh

  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write  # permite subir SARIF al Security tab
      security-events: read
      contents: read          # permite leer el repo
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -t devsecops-demo .

      - name: Trivy scan - generate JSON report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-demo'
          format: 'json'
          output: 'trivy-report.json'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Trivy scan - generate SARIF report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-demo'
          format: 'sarif'
          output: 'trivy-report.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy JSON report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 7

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-report.sarif

      - name: Trivy scan - enforce blocking
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-demo'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Trivy summary
        if: always()
        run: bash scripts/trivy_summary.sh

  zap:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      issues: write
      security-events: write
      security-events: read
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -t devsecops-demo .
      - name: Run app
        run: docker run -d -p 5000:5000 --name app devsecops-demo
      - name: Wait for app to be ready
        run: sleep 5

      - name: Run ZAP scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:5000'
          fail_action: false
          format: sarif
          artifact_name: zap-report

      - name: Upload ZAP SARIF to GitHub Security
        if: always() && hashFiles('zap-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: zap-report.sarif

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: zap-reports
          path: |
            report_html.html
            report_json.json
            report_md.md
          retention-days: 7

      - name: ZAP summary
        if: always()
        run: bash scripts/zap_summary.sh

  # -----------------------------------------------------------------------
  # Job final: consolida todos los artefactos en un único reporte descargable
  # if: always() → se ejecuta aunque cualquier job anterior haya fallado,
  # garantizando que siempre tengas el reporte completo
  # -----------------------------------------------------------------------
  security-report:
    name: Consolidated Security Report
    runs-on: ubuntu-latest
    needs: [sonarcloud, snyk, trivy, zap, gitleaks]
    if: always()
    steps:
      - uses: actions/checkout@v6
      - name: Download all reports
        uses: actions/download-artifact@v8
        with:
          path: all-reports

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Generate consolidated report
        run: bash scripts/generate_consolidated_report.sh

      - name: Upload consolidated report
        uses: actions/upload-artifact@v6
        with:
          name: security-report-${{ github.run_number }}
          path: consolidated-report.md
          retention-days: 7

      - name: Post summary to GitHub
        if: always()
        run: |
          if [ -f consolidated-report.md ]; then
            cat consolidated-report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## Security Report" >> $GITHUB_STEP_SUMMARY
            echo "The consolidated report could not be generated due to an error." >> $GITHUB_STEP_SUMMARY
          fi
